services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: barberia_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-barcelona}
      POSTGRES_DB: ${DB_NAME:-taller}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - barberia_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barberia_backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-barcelona}
      - DB_NAME=${DB_NAME:-taller}
      - DB_SYNCHRONIZE=${DB_SYNCHRONIZE:-true}
      - JWT_SECRET=${JWT_SECRET:-your_secret_key}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - PORT=${BACKEND_PORT:-3001}
      - CORS_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - SOCKET_IO_CORS=${FRONTEND_ORIGIN:-http://localhost:3000}
      - DATABASE_URL=postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-barcelona}@postgres:5432/${DB_NAME:-taller}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - barberia_network
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: sh -c "npm run db:setup && npm run dev"

  # Frontend Service
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: barberia_frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3001/api}
      - VITE_SOCKET_URL=${VITE_SOCKET_URL:-http://localhost:3001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - barberia_network
    volumes:
      - ./Frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  barberia_network:
    driver: bridge
